<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 | Registro PHP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Registro de Contacto (PHP)</h2>
        <p class="subtitle">Laboratorio de Desarrollo de Aplicaciones Web - Semana 09</p>
        
        <form action="procesar.php" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre" 
                    placeholder="Ej. Juan Pérez" 
                    required 
                    autocomplete="off"
                    minlength="2"
                    maxlength="50"
                >
            </div>
            
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="correo" 
                    name="correo" 
                    placeholder="Ej. juan.perez@email.com" 
                    required
                    autocomplete="off"
                >
            </div>
            
            <button type="submit">
                <span>Registrar Contacto</span>
            </button>
        </form>
    </div>
</body>
</html>
